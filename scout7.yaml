mesh_url: "http://localhost:9090"
agent_id: "scout7"
interval: 24h

output:
  tool: "arch7.create_diagram"
  format: "diagram"
  dir: "./diagrams"
  extension: ".excalidraw"
  params:
    direction: "LR"
    theme: "professional"

search:
  queries:
    - "agentic AI architecture 2026"
    - "AI agent framework design pattern"
    - "multi-agent system architecture"
    - "MCP agent orchestration"
    - "autonomous AI agent infrastructure"
  max_results: 3

evaluate:
  min_novelty_score: 7

ollama:
  model: "gemma4:e4b"
